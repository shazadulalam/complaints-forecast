name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/test_pipeline.py -v

      - name: Run pipeline
        run: python main.py

      - name: Verify outputs exist
        run: |
          test -f outputs/forecast_90d.csv
          test -f outputs/coefficients.csv
          test -f outputs/diagnostics.png
          test -f outputs/forecast_90d.png
          echo "All output files generated successfully"

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t complaints-forecast .

      - name: Run pipeline in Docker
        run: |
          docker run --rm -v $(pwd)/outputs:/app/outputs complaints-forecast
          test -f outputs/forecast_90d.csv
          echo "Docker pipeline completed successfully"
